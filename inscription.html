<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inscription Formation</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    section {
      max-width: 500px;
      margin: auto;
      padding: 30px;
    }

    h3 {
      text-align: center;
      font-size: 22px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 14px;
    }

    input[readonly] {
      background: #1e293b;
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 14px;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: darkred;
    }

    button:disabled {
      background: grey;
      cursor: not-allowed;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }

    footer {
      background: #222;
      color: #fff;
      text-align: center;
      padding: 25px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<section>

  <h3>🚀 Inscription à la formation</h3>

  <form id="contactForm">

    <input type="text" name="name" placeholder="Nom complet" required>

    <input type="email" name="email" placeholder="Email" required>

    <input type="text" name="country" placeholder="Pays" required>

    <input type="text" name="whatsapp" placeholder="Numéro WhatsApp" required>

    <!-- Formation auto -->
    <input type="text" id="formation" name="formation" readonly>

    <textarea name="message" placeholder="Message (optionnel)"></textarea>

    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="Nouvelle inscription formation">

    <button type="submit" id="submitBtn">S'inscrire</button>

  </form>

  <p id="status"></p>

</section>

<script>

// 👉 Récupérer la formation depuis l'URL
const params = new URLSearchParams(window.location.search);
const formationValue = params.get("formation") || "Non précisée";
document.getElementById("formation").value = formationValue;


// 👉 Envoi du formulaire
document.getElementById("contactForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const form = e.target;
  const submitBtn = document.getElementById("submitBtn");
  const status = document.getElementById("status");

  const name = form.name.value;
  const email = form.email.value;
  const formation = form.formation.value;

  submitBtn.disabled = true;
  status.style.color = "white";
  status.textContent = "⏳ Envoi en cours...";

  fetch("https://formsubmit.co/ajax/odilonlaly086@gmail.com", {
    method: "POST",
    body: new FormData(form)
  })
  .then(res => res.json())
  .then(() => {

    // ✅ Stockage pour la page merci
    localStorage.setItem('inscritName', name);
    localStorage.setItem('inscritEmail', email);
    localStorage.setItem('inscritFormation', formation);

    status.style.color = "lightgreen";
    status.textContent = "✅ Inscription réussie ! Redirection...";

    // 👉 Redirection vers page merci
    setTimeout(() => {
      window.location.href = "merci.html";
    }, 1200);

  })
  .catch(() => {
    status.style.color = "red";
    status.textContent = "❌ Erreur, réessaie.";
    submitBtn.disabled = false;
  });

});

</script>

<footer>
  <p>© 2026 – Formation Digital % Gaël Nobime / Odilon Laly ®</p>
</footer>

</body>
</html>
